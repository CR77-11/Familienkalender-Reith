<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f3ea" />
  <title>Familienkalender Reith</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <div class="app-name">Familienkalender Reith</div>
        <h1 id="dateTitle">Dienstag · 05. Mai</h1>
        <div class="today-label">Heute</div>
      </div>
      <button id="weatherCard" class="weather-card" type="button">
        <div id="weather">🌤️ Speyer lädt...</div>
        <div id="weatherSub" class="weather-sub">Regen später · 18° / 10°</div>
      </button>
    </header>

    <section class="filters" aria-label="Personenfilter">
      <button class="chip active" data-member="Alle">Alle</button>
      <button class="chip" data-member="Annette">Annette</button>
      <button class="chip" data-member="Christian">Christian</button>
      <button class="chip" data-member="Greta">Greta</button>
      <button class="chip" data-member="Justus">Justus</button>
      <button class="chip" data-member="Henri">Henri</button>
    </section>

    <section id="schedule" class="schedule" aria-live="polite"></section>

    <footer class="next-bar">
      <div class="next-label">Nächster Termin</div>
      <div id="nextEvent" class="next-event">🎹 Greta – Klavierunterricht · in 1h 20min</div>
    </footer>
  </main>

  <dialog id="eventDialog" class="dialog">
    <button id="closeDialog" class="close" type="button">×</button>
    <div id="dialogContent"></div>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
